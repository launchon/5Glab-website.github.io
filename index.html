<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>时隙配置模拟</title>
    <link rel="stylesheet" href="styles/common.css">
    <style>
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 50px 1fr;
            gap: 20px;
            height: calc(100vh - 40px);
        }

        .title-card {
            grid-column: 1 / -1;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 0 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            color: white;
            display: flex;
            align-items: center;
        }

        .title-card h1 {
            margin: 0;
            font-size: 20px;
        }

        .main-content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
        }

        .calculator {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .header {
            color: #2c3e50;
            padding: 5px;
            margin-bottom: 20px;
        }

        .header h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
        }

        .main-content h3 {
            margin: 10px 0 5px 0;
            font-size: 14px;
        }

        .config-area label {
            color: #2c3e50;
            font-size: 14px;
        }

        .config-area {
            display: flex;
            gap: 20px;
            margin-bottom: 8px;
        }

        select {
            background-color: white;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            padding: 5px 10px;
            color: #2c3e50;
            font-size: 13px;
        }

        select:focus {
            outline: none;
            border-color: #3498db;
        }

        .timeline {
            background: rgba(236, 240, 241, 0.8);
            border: 1px solid rgba(189, 195, 199, 0.5);
            height: 35px;
            margin: 8px 0;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0;
            overflow: hidden;
            border-radius: 10px;
        }

        .timeline-divider {
            position: absolute;
            height: 100%;
            width: 1px;
            background-color: #95a5a6;
            border-left: 1px dashed #95a5a6;
            pointer-events: none;
        }

        .resource-pool {
            background: rgba(236, 240, 241, 0.8);
            border: 1px solid rgba(189, 195, 199, 0.5);
            border-radius: 10px;
            padding: 10px;
            display: flex;
            gap: 10px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        
        .block {
            width: 90px;
            height: 25px;
            cursor: move;
            display: inline-block;
            margin: 3px;
            position: relative;
            box-sizing: border-box;
            font-size: 12px;
            line-height: 25px;
            text-align: center;
        }

        .downlink-time { background-color: #ffff66; }
        .uplink-time { background-color: #ff6666; }
        .guard-time { background-color: #FFFFFF; border: 1px solid #a66a6a; }
        .downlink-symbol { background-color: #2196F3; }
        .uplink-symbol { background-color: #99cc66; }
        .gp-symbol { background-color: #FFFFFF; border: 1px solid #000; }

        .draggable-clone {
            position: absolute;
            pointer-events: none;
            opacity: 0.7;
        }

        .subframe-block {
            height: 100%;
            background-color: #cb68fc;
            border-right: 1px solid #ccc;
        }

        .timeline-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            display: grid;
            pointer-events: none;
        }

        .timeline .block {
            margin: 0;
            height: 100%;
            flex: none;
        }

        .calculator h2 {
            font-size: 16px;
            margin: 0 0 10px 0;
        }

        .calculator p {
            font-size: 14px;
            margin: 0;
        }

        /* 添加配置完毕按钮样式 */
        .config-complete-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        .config-complete-button:hover {
            background-color: #2ecc71;
        }

        .config-complete-button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="nav-buttons">
        <a href="index.html" class="nav-button active">时隙配置</a>
        <a href="deploy.html" class="nav-button">站点部署</a>
        <a href="login.html" class="nav-button">退出登录</a>
    </div>
    <div class="container">
        <div class="title-card">
            <h1>时隙配置模拟</h1>
        </div>

        <div class="main-content">
            <div class="header">
                <h2>时隙配置模拟器</h2>
                <div class="config-area">
                    <div>
                        <label>单无线帧内子帧数：</label>
                        <select id="subframeCount" onchange="updateTimelines()">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                            <option value="10">10</option>
                        </select>
                    </div>
                    <div>
                        <label>子帧内时隙数：</label>
                        <select id="slotCount" onchange="updateTimelines()">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="4">4</option>
                            <option value="8">8</option>
                            <option value="16">16</option>
                        </select>
                    </div>
                    <div>
                        <label>上行符号数：</label>
                        <input type="number" id="uplinkSymbols" min="0" value="0" style="width: 60px;">
                    </div>
                    <div>
                        <label>下行符号数：</label>
                        <input type="number" id="downlinkSymbols" min="0" value="0" style="width: 60px;">
                    </div>
                </div>
            </div>

            <div>
                <h3>子帧</h3>
                <div class="timeline" id="subframe-timeline" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
                
                <h3>时隙</h3>
                <div class="timeline" id="slot-timeline" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
                
                <h3>符号</h3>
                <div class="timeline" id="symbol-timeline" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
            </div>

            <h3>资源池</h3>
            <div class="resource-pool">
                <div class="block downlink-time" draggable="true" ondragstart="drag(event)" data-type="downlink-time">下行时隙</div>
                <div class="block uplink-time" draggable="true" ondragstart="drag(event)" data-type="uplink-time">上行时隙</div>
                <div class="block guard-time" draggable="true" ondragstart="drag(event)" data-type="guard-time">自包含时隙</div>
                <div class="block downlink-symbol" draggable="true" ondragstart="drag(event)" data-type="downlink-symbol">下行符号</div>
                <div class="block uplink-symbol" draggable="true" ondragstart="drag(event)" data-type="uplink-symbol">上行符号</div>
                <div class="block gp-symbol" draggable="true" ondragstart="drag(event)" data-type="gp-symbol">GP符号</div>
            </div>

            <button id="configCompleteButton" class="config-complete-button" onclick="saveAndReturn()">配置完毕</button>
        </div>

        <div class="calculator">
            <h2 class="section-title">5G NR TBS 计算器</h2>
            
           

            <div class="input-section">
                <div class="input-group">
                    <label class="input-label">
                        MCS Index（调制编码策略指数）
                        <input type="number" class="input-field" value="17" id="mcs-number">
                    </label>
                </div>

                <div class="input-group">
                    <label class="input-label">
                        子载波参数μ
                        <select class="input-field" id="subcarrier-mu">
                            <option value="0">μ=0 (15kHz)</option>
                            <option value="1">μ=1 (30kHz)</option>
                            <option value="2">μ=2 (60kHz)</option>
                            <option value="3">μ=3 (120kHz)</option>
                            <option value="4">μ=4 (240kHz)</option>
                            <option value="5">μ=5 (480kHz)</option>
                        </select>
                    </label>
                </div>

                <div class="input-group">
                    <label class="input-label">
                        v(μ)Layers (maximum number of MIMO layers)
                        <input type="number" class="input-field" value="1" min="1" max="8" id="mimo-layers">
                    </label>
                </div>

                <div class="input-group">
                    <label class="input-label">
                        Nprb (Total number of allocated PRBs for the UE)
                        <input type="number" class="input-field" value="15" min="1" max="273" id="nprb">
                    </label>
                </div>

                <div class="input-group">
                    <label class="input-label">
                        N sh symb (时隙中分配给PDSCH的符号数)
                        <input type="number" class="input-field" value="13" min="1" id="scheduled-symbols">
                    </label>
                </div>

                <div class="input-group">
                    <label class="input-label">
                        N prb dmrs (PRB中用于DMRS的RE数)
                        <input type="number" class="input-field" value="12" min="0" id="dmrs-per-prb">
                    </label>
                </div>

                <div class="input-group">
                    <label class="input-label">
                        N prb oh （PDSCH开销）
                        <input type="number" class="input-field" value="0" min="0" id="overhead">
                    </label>
                </div>


                <div class="input-group">
                    <label class="input-label">
                        Qm （调制阶数）
                        <input type="number" class="input-field" value="6" id="modulation-order">
                    </label>
                </div>

                <div class="input-group">
                    <label class="input-label">
                        R （目标码率）
                        <input type="number" class="input-field" value="438" id="code-rate">
                    </label>
                </div>
                <div class="result-panel" style="border: 2px solid #3498db; background-color: rgba(255, 255, 255, 0.9); border-radius: 10px; padding: 15px; margin-top: 20px;">
                    <h3 style="color: #2c3e50; margin-bottom: 10px;">计算结果</h3>
                    <div class="result-item">
                        N(RE): <span class="result-value" id="nre-result">0</span>
                    </div>
                    <div class="result-item">
                        Ninfo (信息位数): <span class="result-value" id="ninfo-result">0</span>
                    </div>
                    <div class="result-item">
                        5G NR TBS (传输块大小): <span class="result-value" id="tbs-result">0</span>
                    </div>
                    <div class="result-item">
                        计算的最大吞吐量 (Mbps): <span class="result-value" id="throughput-result">0</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 添加部署完毕按钮 -->
        <button id="deploymentCompleteButton" class="config-complete-button" style="display: none;" onclick="window.location.href='deploy.html'">部署完毕</button>
    </div>

    <script>
        function allowDrop(ev) {
            ev.preventDefault();
        }

        function drag(ev) {
            ev.dataTransfer.setData("text", ev.target.getAttribute('data-type'));
        }

        function drop(ev) {
            ev.preventDefault();
            const data = ev.dataTransfer.getData("text");
            const timeline = ev.target;
            
            if (timeline.classList.contains('timeline')) {
                // 检查是否是合法的拖放组合
                const isSlotTimeline = timeline.id === 'slot-timeline';
                const isSymbolTimeline = timeline.id === 'symbol-timeline';
                
                // 定义合法的时隙和符号类型
                const slotTypes = ['downlink-time', 'uplink-time', 'guard-time'];
                const symbolTypes = ['downlink-symbol', 'uplink-symbol', 'gp-symbol'];
                
                // 验证拖放是否合法
                if ((isSlotTimeline && !slotTypes.includes(data)) || 
                    (isSymbolTimeline && !symbolTypes.includes(data))) {
                    // 如果不合法，显示提示并返回
                    showToast(isSlotTimeline ? 
                        "只能在时隙时间轴放置时隙类型" : 
                        "只能在符号时间轴放置符号类型");
                    return;
                }

                const newBlock = document.createElement('div');
                newBlock.className = `block ${data}`;
                
                const totalSlots = timeline.id === 'symbol-timeline' ? 
                    parseInt(document.getElementById('slotCount').value) * 2 : 
                    parseInt(document.getElementById('slotCount').value);
                
                const timelineWidth = timeline.offsetWidth;
                const blockWidth = timelineWidth / totalSlots;
                newBlock.style.width = `${blockWidth}px`;
                
                const blocks = Array.from(timeline.children).filter(child => 
                    child.classList.contains('block'));
                
                if (blocks.length < totalSlots) {
                    timeline.appendChild(newBlock);
                }
            }
        }

        // 添加提示函数
        function showToast(message) {
            // 检查是否已存在toast元素
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                document.body.appendChild(toast);
            }
            
            // 设置toast样式
            Object.assign(toast.style, {
                position: 'fixed',
                top: '80px',
                left: '50%',
                transform: 'translateX(-50%)',
                background: 'rgba(114, 116, 154, 0.9)',
                color: 'white',
                padding: '10px 20px',
                borderRadius: '4px',
                zIndex: '1000',
                transition: 'opacity 0.3s',
                fontSize: '14px'
            });
            
            // 显示消息
            toast.textContent = message;
            toast.style.opacity = '1';
            
            // 3秒后隐藏
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 3000);
        }

        function updateTimelines() {
            const subframeCount = parseInt(document.getElementById('subframeCount').value);
            const slotCount = parseInt(document.getElementById('slotCount').value);
            
            const subframeTimeline = document.getElementById('subframe-timeline');
            subframeTimeline.innerHTML = '';
            
            for (let i = 0; i < subframeCount; i++) {
                const block = document.createElement('div');
                block.className = 'subframe-block';
                block.style.width = `${100 / subframeCount}%`;
                block.style.height = '100%';
                block.style.float = 'left';
                subframeTimeline.appendChild(block);
            }
            
            const slotTimeline = document.getElementById('slot-timeline');
            const symbolTimeline = document.getElementById('symbol-timeline');
            
            slotTimeline.innerHTML = '';
            symbolTimeline.innerHTML = '';
            
            for (let i = 1; i < slotCount; i++) {
                const slotDivider = document.createElement('div');
                slotDivider.className = 'timeline-divider';
                slotDivider.style.left = `${(i * 100) / slotCount}%`;
                slotTimeline.appendChild(slotDivider);
                
                const symbolDivider = document.createElement('div');
                symbolDivider.className = 'timeline-divider';
                symbolDivider.style.left = `${(i * 100) / slotCount}%`;
                symbolTimeline.appendChild(symbolDivider);
            }
            
            for (let i = 0; i < slotCount; i++) {
                const middleDivider = document.createElement('div');
                middleDivider.className = 'timeline-divider';
                middleDivider.style.left = `${((i * 100) + 50) / slotCount}%`;
                symbolTimeline.appendChild(middleDivider);
            }
        }

        document.addEventListener('DOMContentLoaded', updateTimelines);


        
        // 其他输入框变化时更新结果
        document.querySelectorAll('.input-field, select').forEach(input => {
            input.addEventListener('change', updateResults);
        });

        // 页面加载时调用
        document.addEventListener('DOMContentLoaded', function() {
            // 检查是否是计算模式
            const urlParams = new URLSearchParams(window.location.search);
            const mode = urlParams.get('mode');
            const requestKey = urlParams.get('requestKey');
            
            if (mode === 'calculate') {
                console.log('进入计算模式');
                // 获取计算请求
                const calculationRequest = JSON.parse(localStorage.getItem(requestKey || 'calculationRequest') || '{}');
                if (calculationRequest.status === 'pending') {
                    console.log('收到计算请求:', calculationRequest);
                    try {
                        // 使用SINR计算MCS
                        const sinr = calculationRequest.sinr;
                        console.log("request.sinr", sinr);
                        let mcs;
                        if (sinr >= 27.86) mcs = 15;
                        else if (sinr >= 26.01) mcs = 14;
                        else if (sinr >= 23.41) mcs = 13;
                        else if (sinr >= 20.87) mcs = 12;
                        else if (sinr >= 19.20) mcs = 11;
                        else if (sinr >= 16.93) mcs = 10;
                        else if (sinr >= 14.53) mcs = 9;
                        else if (sinr >= 12.25) mcs = 8;
                        else if (sinr >= 9.85) mcs = 7;
                        else if (sinr >= 8.48) mcs = 6;
                        else if (sinr >= 6.29) mcs = 5;
                        else if (sinr >= 4.14) mcs = 4;
                        else if (sinr >= 0.56) mcs = 3;
                        else if (sinr >= -4.13) mcs = 2;
                        else if (sinr >= -8.51) mcs = 1;
                        else mcs = 1;

                        // 设置计算器的输入值
                        document.getElementById('mcs-number').value = mcs;
                        document.getElementById('nprb').value = '273';
                        document.getElementById('scheduled-symbols').value = calculationRequest.symbolCount.toString();
                        document.getElementById('dmrs-per-prb').value = '2';
                        document.getElementById('overhead').value = '0';
                        
                        // 触发计算
                        updateResults();
                        
                        // 获取计算结果
                        const throughput = parseFloat(document.getElementById('throughput-result').textContent);
                        
                        // 返回计算结果
                        const result = {
                            requestId: calculationRequest.requestId,
                            status: 'completed',
                            achievableRate: throughput
                        };
                        
                        console.log('计算完成，返回结果:', result);
                        localStorage.setItem('calculationResult', JSON.stringify(result));
                    } catch (error) {
                        console.error('计算过程出错:', error);
                        // 返回错误结果
                        const result = {
                            requestId: calculationRequest.requestId,
                            status: 'error',
                            error: error.message
                        };
                        localStorage.setItem('calculationResult', JSON.stringify(result));
                    }
                }
                return; // 不继续加载页面的其他内容
            }
            
            // 原有的页面初始化代码
            loadSavedConfig();
            updateSlotDisplay();
        });

        // 确保updateResults函数可用
        function updateResults() {
            const mcsIndex = parseInt(document.getElementById('mcs-number').value);
            const subcarrierMu = parseInt(document.getElementById('subcarrier-mu').value);
            const nprb = parseInt(document.getElementById('nprb').value);
            const scheduledSymbols = parseInt(document.getElementById('scheduled-symbols').value);
            const dmrsPerPrb = parseInt(document.getElementById('dmrs-per-prb').value);
            const overhead = parseInt(document.getElementById('overhead').value);
            const modulationOrder = parseInt(document.getElementById('modulation-order').value);
            const codeRate = parseInt(document.getElementById('code-rate').value);
            const mimolayers = parseInt(document.getElementById('mimo-layers').value);

            // 根据μ值计算时隙长度（毫秒）
            const slotLength = 1 / Math.pow(2, subcarrierMu);
            
            // 计算 N(RE')
            const nRE1 = scheduledSymbols * 12 - overhead - dmrsPerPrb;
            const nRE = Math.min(156, nRE1) * nprb;
            document.getElementById('nre-result').textContent = nRE;

            // 计算 Ninfo
            const ninfo = nRE * (codeRate/1024) * modulationOrder;
            document.getElementById('ninfo-result').textContent = ninfo.toFixed(4);

            // 计算 TBS
            let tbs;
            if (ninfo <= 3824) {
                const n = Math.max(3, Math.floor(Math.log2(ninfo) - 6));
                const ninfo1 = Math.max(24, Math.pow(2, n) * Math.floor(ninfo / Math.pow(2, n)));
                //查表得到tbs
                const tbs_table = [24,32,40,48,56,64,72,80,88,96,104,112,120,128,136,144,152,160,168,176,184,192,208,240,256,272,280,304,320,336,352,368,384,408,432,456,480,504,528,552,576,608,640,672,704,736,768,808,848,928,984,1032,1064,1128,1160,1192,1224,1256,1288,1320,1352,1416,1480,1544,1608,1672,1736,1800,1864,1928,2024,2088,2152,2216,2280,2408,2472,2536,2600,2664,2728,2792,2856,2976,3104,3240,3368,3496,3624,3752,3824];
                
                // 修复循环逻辑
                tbs = 24; // 默认最小值
                for(let i = 0; i < tbs_table.length; i++){
                    if(ninfo1 >= tbs_table[i]){
                        tbs = tbs_table[i];
                    } else {
                        break;
                    }
                }
            } else if (ninfo > 3824) {
                const n = Math.floor(Math.log2(ninfo - 24)) - 5;
                const ninfo1 = Math.max(3824, Math.pow(2, n) * Math.round((ninfo - 24) / Math.pow(2, n)));
                if (codeRate <= 0.25) {
                    const C = Math.floor((ninfo + 24) / 3816);
                    tbs = 8 * C * Math.ceil((ninfo + 24) / (8 * C));
                } else {
                    if (ninfo > 8424) {
                        const C = Math.floor((ninfo + 24) / 8424);
                        tbs = 8 * C * Math.ceil((ninfo + 24) / (8 * C));
                    } else {
                        tbs = 8 * Math.ceil((ninfo + 24) / 8) - 24;
                    }
                }
            }
            document.getElementById('tbs-result').textContent = tbs;

            // // 计算吞吐量 (Mbps)
            // const throughput = tbs / 1024;
            // document.getElementById('throughput-result').textContent = throughput.toFixed(3);

            // 计算小区容量
            const throughput = mimolayers * Math.pow(2,subcarrierMu) *tbs *1000 /1024/1024;
            console.log("throughput",throughput);
            console.log("mimolayers",mimolayers);
            console.log("Math.pow",Math.pow(2,subcarrierMu));
            
            document.getElementById('throughput-result').textContent = throughput.toFixed(3);
        }

        // 修改配置保存功能
        function saveAndReturn() {
            const selectedStationId = localStorage.getItem('selectedStationId');
            if (!selectedStationId) {
                alert('未找到选中的基站！');
                return;
            }

            // 获取当前配置
            const uplinkSymbols = document.getElementById('uplinkSymbols').value;
            const downlinkSymbols = document.getElementById('downlinkSymbols').value;
            const subframeCount = document.getElementById('subframeCount').value;
            const slotCount = document.getElementById('slotCount').value;
            
            // 获取时隙配置
            const slotConfig = [];
            const slotTimeline = document.getElementById('slot-timeline');
            Array.from(slotTimeline.children).forEach(block => {
                if (block.classList.contains('block')) {
                    slotConfig.push(block.classList.contains('downlink-time') ? 'downlink' : 
                                  block.classList.contains('uplink-time') ? 'uplink' : 'guard');
                }
            });

            // 获取符号配置
            const symbolConfig = [];
            const symbolTimeline = document.getElementById('symbol-timeline');
            Array.from(symbolTimeline.children).forEach(block => {
                if (block.classList.contains('block')) {
                    symbolConfig.push(block.classList.contains('downlink-symbol') ? 'downlink' : 
                                    block.classList.contains('uplink-symbol') ? 'uplink' : 'guard');
                }
            });

            try {
                // 获取现有配置
                let stationsConfig = JSON.parse(localStorage.getItem('stationsConfig') || '[]');
                
                // 更新当前基站的配置
                const stationIndex = stationsConfig.findIndex(station => station.id === selectedStationId);
                if (stationIndex !== -1) {
                    // 保留原有的antennaConfig
                    const existingConfig = stationsConfig[stationIndex];
                    stationsConfig[stationIndex] = {
                        ...existingConfig,
                        symbolRatio: {
                            uplink: uplinkSymbols,
                            downlink: downlinkSymbols
                        },
                        subframeCount: subframeCount,
                        slotCount: slotCount,
                        slotConfig: slotConfig,
                        symbolConfig: symbolConfig,
                        lastUpdated: new Date().toISOString()
                    };
                } else {
                    // 如果找不到配置，创建新的
                    stationsConfig.push({
                        id: selectedStationId,
                        symbolRatio: {
                            uplink: uplinkSymbols,
                            downlink: downlinkSymbols
                        },
                        subframeCount: subframeCount,
                        slotCount: slotCount,
                        slotConfig: slotConfig,
                        symbolConfig: symbolConfig,
                        lastUpdated: new Date().toISOString()
                    });
                }

                // 保存更新后的配置
                localStorage.setItem('stationsConfig', JSON.stringify(stationsConfig));
                console.log('配置已保存');

                // 确保配置保存成功后再跳转
                setTimeout(() => {
                    console.log('准备跳转到deploy.html');
                    window.location.replace('./deploy.html');
                }, 100);

            } catch (error) {
                console.error('保存配置时出错:', error);
                alert('保存配置时出错，请重试！');
            }
        }

        // 添加localStorage变化监听
        window.addEventListener('storage', function(e) {
            console.log('localStorage变化，调用updateStationCount');
            if (e.key === 'stationsConfig') {
                updateStationCount();
            }
        });

        // Okumura-Hata模型参数
        const P = 10; // 基站发射功率，单位W
        const fc = 900; // MHz
        const h_te = 30; // 基站天线高度，m
        const h_re = 1.5; // 用户天线高度，m
        const alpha_hre = 6.87; // 有效天线修正因子
        const N = 18; // 邻小区数

        // 计算路径损耗（dB），d单位为km
        function pathLoss(d) {
            if (d < 0.01) d = 0.01; // 防止log(0)
            return -(69.55 + 26.16 * Math.log10(fc) - 13.82 * Math.log10(h_te) - alpha_hre + (44.9 - 6.55 * Math.log10(h_te)) * Math.log10(d));
        }

        // 计算SINR（dB），输入：用户到中心基站距离（米），中心基站坐标，所有邻小区基站坐标
        function calcSINR(userX, userY, centerX, centerY, neighborStations) {
            // 1. 计算用户到中心基站距离（km）
            const dc = Math.sqrt(Math.pow(userX - centerX, 2) + Math.pow(userY - centerY, 2)) * 0.01; // 像素*10米→米→km
            // 2. 路径损耗
            const Lpc = pathLoss(dc);
            // 3. 接收功率（线性）
            const Pr = P * Math.pow(10, Lpc / 10);

            // 4. 干扰功率
            let Po = 0;
            neighborStations.forEach(st => {
                const dsto = Math.sqrt(Math.pow(userX - st.x, 2) + Math.pow(userY - st.y, 2)) * 0.01; // km
                const Lps = pathLoss(dsto);
                Po += P * Math.pow(10, Lps / 10);
            });

            // 5. SIR（dB）
            if (Po === 0) return 30; // 没有干扰时，给个很高的SIR
            return 10 * Math.log10(Pr / Po);
        }

        function updateStationCount() {
            const placedStations = document.querySelectorAll('.base-station-container.placed');
            const countElement = document.querySelector('.station-count');
            const maxLimitMessage = document.querySelector('.max-limit-message');
            const resourceStation = document.querySelector('.resource-pool .base-station-container');
            
            const count = placedStations.length;
            countElement.textContent = `${count}/6`;
            
            if (count >= 6) {
                maxLimitMessage.style.display = 'block';
                if (resourceStation) resourceStation.setAttribute('draggable', 'false');
            } else {
                maxLimitMessage.style.display = 'none';
                if (resourceStation) resourceStation.setAttribute('draggable', 'true');
            }
        }

        function enterDemandPointMode() {
            // ...原有代码...
            document.getElementById('demandPointsCompleteButton').style.display = 'block';
            console.log('进入需求点模式，显示需求点部署完毕按钮');
        }

        function analyzeDemandPoints() {
            console.log('开始分析业务需求点');
            
            // 获取所有需求点和基站
            const demandPoints = JSON.parse(localStorage.getItem('demandPointsData') || '[]');
            const stations = JSON.parse(localStorage.getItem('stationsConfig') || '[]');
            
            if (demandPoints.length === 0) {
                alert('请先部署业务需求点！');
                return;
            }
            
            // 创建结果表格的HTML
            let html = `
                <table style="width:100%; border-collapse:collapse; margin-top:10px;">
                    <thead>
                        <tr style="background-color: rgba(52, 152, 219, 0.1);">
                            <th style="padding:8px; border:1px solid #ddd;">编号</th>
                            <th style="padding:8px; border:1px solid #ddd;">类型</th>
                            <th style="padding:8px; border:1px solid #ddd;">距离(m)</th>
                            <th style="padding:8px; border:1px solid #ddd;">SINR(dB)</th>
                            <th style="padding:8px; border:1px solid #ddd;">MCS</th>
                            <th style="padding:8px; border:1px solid #ddd;">上行需求(Mbps)</th>
                            <th style="padding:8px; border:1px solid #ddd;">下行需求(Mbps)</th>
                            <th style="padding:8px; border:1px solid #ddd;">上行可达(Mbps)</th>
                            <th style="padding:8px; border:1px solid #ddd;">下行可达(Mbps)</th>
                            <th style="padding:8px; border:1px solid #ddd;">结果</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            demandPoints.forEach((dp, index) => {
                // 1. 找最近基站
                let minDist = Infinity;
                let nearestStation = null;
                stations.forEach(st => {
                    const dx = (dp.x - (st.position.x + 60));
                    const dy = (dp.y - (st.position.y + 60));
                    const dist = Math.sqrt(dx*dx + dy*dy) * 10; // 转换为米
                    if (dist < minDist) {
                        minDist = dist;
                        nearestStation = st;
                    }
                });
                
                // 2. 计算SINR
                const neighborStations = stations
                    .filter(st => st.id !== nearestStation.id)
                    .map(st => ({
                        x: st.position.x + 60,
                        y: st.position.y + 60
                    }));
                
                const sinr = calcSINR(
                    dp.x, 
                    dp.y, 
                    nearestStation.position.x + 60, 
                    nearestStation.position.y + 60, 
                    neighborStations
                );
                
                // 3. SINR → MCS
                const mcs = sinrToMCS(sinr);
                
                // 4. 计算上下行可达速率
                const uplinkSymbols = parseInt(nearestStation.symbolRatio.uplink);
                const downlinkSymbols = parseInt(nearestStation.symbolRatio.downlink);
                const achievableRateUplink = calcThroughput(mcs, uplinkSymbols);
                const achievableRateDownlink = calcThroughput(mcs, downlinkSymbols);
                
                // 5. 获取上下行需求速率
                const requiredRateUplink = parseFloat(dp.businessRateUplink || 0);
                const requiredRateDownlink = parseFloat(dp.businessRateDownlink || 0);
                
                // 6. 比较需求速率和可达速率
                const isUplinkSatisfied = achievableRateUplink >= requiredRateUplink;
                const isDownlinkSatisfied = achievableRateDownlink >= requiredRateDownlink;
                const isSatisfied = isUplinkSatisfied && isDownlinkSatisfied;
                
                // 添加到结果表格
                html += `
                    <tr>
                        <td style="padding:8px; border:1px solid #ddd;">P${index + 1}</td>
                        <td style="padding:8px; border:1px solid #ddd;">${dp.type === 'red' ? '高' : '低'}</td>
                        <td style="padding:8px; border:1px solid #ddd;">${minDist.toFixed(2)}</td>
                        <td style="padding:8px; border:1px solid #ddd;">${sinr.toFixed(2)}</td>
                        <td style="padding:8px; border:1px solid #ddd;">${mcs}</td>
                        <td style="padding:8px; border:1px solid #ddd;">${requiredRateUplink}</td>
                        <td style="padding:8px; border:1px solid #ddd;">${requiredRateDownlink}</td>
                        <td style="padding:8px; border:1px solid #ddd;">${achievableRateUplink.toFixed(2)}</td>
                        <td style="padding:8px; border:1px solid #ddd;">${achievableRateDownlink.toFixed(2)}</td>
                        <td style="padding:8px; border:1px solid #ddd; color:${isSatisfied ? 'green' : 'red'}">
                            ${isSatisfied ? '满足' : '不满足'}
                        </td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            
            // 显示结果
            const resultDiv = document.getElementById('demandPointsAnalysisResult');
            resultDiv.innerHTML = html;
            
            console.log('分析完成，结果已显示');
        }

        // SINR到MCS的映射函数（示例值，需要根据实际情况调整）
        function sinrToMCS(sinr) {
            if (sinr >= 27.86) return 15;
            else if (sinr >= 26.01) return 14;
            else if (sinr >= 23.41) return 13;
            else if (sinr >= 20.87) return 12;
            else if (sinr >= 19.20) return 11;
            else if (sinr >= 16.93) return 10;
            else if (sinr >= 14.53) return 9;
            else if (sinr >= 12.25) return 8;
            else if (sinr >= 9.85) return 7;
            else if (sinr >= 8.48) return 6;
            else if (sinr >= 6.29) return 5;
            else if (sinr >= 4.14) return 4;
            else if (sinr >= 0.56) return 3;
            else if (sinr >= -4.13) return 2;
            else if (sinr >= -8.51) return 1;
            else return 1;
        }

        // 修改calcThroughput函数，添加scheduledSymbols参数
        function calcThroughput(mcs, scheduledSymbols) {
            const nprb = 15; // 示例值
            const dmrsPerPrb = 12;
            const overhead = 0;
            
            // 计算 N(RE)
            const nRE1 = scheduledSymbols * 12 - overhead - dmrsPerPrb;
            const nRE = Math.min(156, nRE1) * nprb;
            
            // 根据MCS获取调制阶数和码率
            const modulationOrder = Math.floor(mcs / 4) + 2;
            const codeRate = (mcs % 4 + 1) * 0.25;
            
            // 计算信息位
            const ninfo = nRE * codeRate * modulationOrder;
            
            // 简化的TBS计算
            const tbs = Math.floor(ninfo * 0.8);
            
            // 返回Mbps
            return tbs / 1024;
        }
    </script>
